name: Build EasyTier for Android (aarch64)

on:
  workflow_dispatch:
    inputs:
      easytier_tag:
        description: 'EasyTier release tag (e.g. v2.1.0, leave empty for latest)'
        required: false
        default: ''
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Resolve EasyTier ref
        id: resolve_ref
        shell: bash
        run: |
          INPUT_TAG="${{ inputs.easytier_tag }}"
          if [ -n "$INPUT_TAG" ]; then
            echo "ref=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            echo "Resolved input tag: $INPUT_TAG"
          else
            LATEST=$(curl -fsSL https://api.github.com/repos/EasyTier/EasyTier/releases/latest | jq -r '.tag_name')
            if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
              echo "Failed to resolve latest EasyTier release tag"
              exit 1
            fi
            echo "ref=$LATEST" >> "$GITHUB_OUTPUT"
            echo "Resolved latest tag: $LATEST"
          fi

      - name: Validate resolved ref
        shell: bash
        run: |
          test -n "${{ steps.resolve_ref.outputs.ref }}"
          test "${{ steps.resolve_ref.outputs.ref }}" != "null"

      - name: Check if already built
        id: check_built
        shell: bash
        run: |
          TAG="${{ steps.resolve_ref.outputs.ref }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          if [ "$STATUS" = "200" ]; then
            echo "already_built=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists, skipping build."
          else
            echo "already_built=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG not found, will build."
          fi

      - name: Checkout EasyTier source
        if: steps.check_built.outputs.already_built == 'false'
        uses: actions/checkout@v4
        with:
          repository: EasyTier/EasyTier
          ref: ${{ steps.resolve_ref.outputs.ref }}
          fetch-depth: 1

      - name: Install Rust toolchain
        if: steps.check_built.outputs.already_built == 'false'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust dependencies
        if: steps.check_built.outputs.already_built == 'false'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      - name: Setup Android NDK
        if: steps.check_built.outputs.already_built == 'false'
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Configure Cargo for Android cross-compilation
        if: steps.check_built.outputs.already_built == 'false'
        shell: bash
        run: |
          NDK_PATH="${{ steps.setup_ndk.outputs.ndk-path }}"
          CLANG="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "$CLANG"
          EOF
          echo "Linker set to: $CLANG"

      - name: Set Android environment variables
        if: steps.check_built.outputs.already_built == 'false'
        shell: bash
        run: |
          NDK_PATH="${{ steps.setup_ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          echo "CC_aarch64_linux_android=$TOOLCHAIN/bin/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
          echo "CXX_aarch64_linux_android=$TOOLCHAIN/bin/aarch64-linux-android21-clang++" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$TOOLCHAIN/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"

      - name: Build easytier-core (static, aarch64-android)
        if: steps.check_built.outputs.already_built == 'false'
        shell: bash
        run: |
          cargo build --release \
            --target aarch64-linux-android \
            --bin easytier-core \
            --features "static" 2>&1 | tee build.log
        env:
          CARGO_BUILD_JOBS: 4
          RUSTFLAGS: -C target-feature=+crt-static

      - name: Verify binary
        if: steps.check_built.outputs.already_built == 'false'
        shell: bash
        run: |
          BIN="target/aarch64-linux-android/release/easytier-core"
          ls -lh "$BIN"
          file "$BIN"

      - name: Compress binary
        if: steps.check_built.outputs.already_built == 'false'
        shell: bash
        run: |
          BIN="target/aarch64-linux-android/release/easytier-core"
          cp "$BIN" easytier-core-aarch64-android
          gzip -9 -k easytier-core-aarch64-android
          sha256sum easytier-core-aarch64-android > easytier-core-aarch64-android.sha256
          sha256sum easytier-core-aarch64-android.gz >> easytier-core-aarch64-android.sha256

      - name: Create GitHub Release
        if: steps.check_built.outputs.already_built == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_ref.outputs.ref }}
          target_commitish: ${{ github.sha }}
          name: EasyTier ${{ steps.resolve_ref.outputs.ref }} - Android aarch64
          body: |
            EasyTier Android (aarch64) 静态编译版。
            基于 EasyTier 官方源码 `${{ steps.resolve_ref.outputs.ref }}` 编译。
          files: |
            easytier-core-aarch64-android
            easytier-core-aarch64-android.gz
            easytier-core-aarch64-android.sha256
          token: ${{ secrets.GITHUB_TOKEN }}
